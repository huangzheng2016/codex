name: codex-sec-release-build

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    name: Build codex-sec release (${{ matrix.label }})
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 120
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      CARGO_NET_RETRY: "10"
      CARGO_HTTP_TIMEOUT: "600"
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runs_on: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            asset_name: codex-sec-linux-x86_64
            bin_name: codex-sec
            install_linux_deps: true
          - label: windows-x86_64
            runs_on: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: codex-sec-windows-x86_64.exe
            bin_name: codex-sec.exe
            install_linux_deps: false
          - label: macos-x86_64
            runs_on: macos-15-intel
            target: x86_64-apple-darwin
            asset_name: codex-sec-macos-x86_64
            bin_name: codex-sec
            install_linux_deps: false
          - label: macos-aarch64
            runs_on: macos-15
            target: aarch64-apple-darwin
            asset_name: codex-sec-macos-aarch64
            bin_name: codex-sec
            install_linux_deps: false
    defaults:
      run:
        working-directory: codex-rs

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Linux bwrap build dependencies
        if: ${{ matrix.install_linux_deps }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev

      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
        with:
          targets: ${{ matrix.target }}

      - name: Prefer HTTP/1.1 for git on macOS
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        run: git config --global http.version HTTP/1.1

      - name: Cargo build
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --timings --bin codex-sec --target ${{ matrix.target }}

      - name: Stage release asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" "dist/${{ matrix.asset_name }}"
          if [[ "${{ runner.os }}" != "Windows" ]]; then
            chmod 755 "dist/${{ matrix.asset_name }}"
          fi

      - name: Upload Cargo timings
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cargo-timings-codex-sec-release-${{ matrix.label }}
          path: codex-rs/target/**/cargo-timings/cargo-timing.html
          if-no-files-found: warn
          retention-days: 7

      - name: Upload release asset
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codex-sec-release-${{ matrix.label }}
          path: codex-rs/dist/${{ matrix.asset_name }}
          if-no-files-found: error
          retention-days: 7

  publish-release:
    name: Publish rolling latest release
    if: ${{ always() }}
    needs:
      - build-release
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Download successful release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: codex-sec-release-*
          path: dist
          merge-multiple: true

      - name: Publish rolling latest release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          release_tag="codex-sec-latest"
          release_title="codex-sec latest"
          release_notes="$(cat <<EOF
          Rolling latest codex-sec release for \`${GITHUB_REPOSITORY}\`.

          Commit: \`${GITHUB_SHA}\`
          Branch: \`${GITHUB_REF_NAME}\`
          Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Included assets:
          $(find dist -maxdepth 1 -type f -printf -- '- `%f`\n' | sort)
          EOF
          )"

          shopt -s nullglob
          assets=(dist/*)
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "No successful codex-sec artifacts were produced; skipping release publish." >&2
            exit 1
          fi

          if gh release view "${release_tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release delete "${release_tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --yes \
              --cleanup-tag
          fi

          gh release create "${release_tag}" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "${release_title}" \
            --notes "${release_notes}" \
            --latest \
            "${assets[@]}"
